name: 🤖 AI Blog Agent

on:
  # Run every day at 8:00 AM UTC — writes 3 posts per run
  schedule:
    - cron: '0 8 * * *'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of blog posts to generate'
        required: false
        default: '3'
      dry_run:
        description: 'Dry run (no saves to Supabase)'
        type: boolean
        required: false
        default: false

jobs:
  generate-blogs:
    name: Generate Blog Posts
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: agent/package.json

      - name: 📦 Install agent dependencies
        working-directory: agent
        run: npm install

      - name: 🤖 Run AI blog agent
        working-directory: agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running in DRY RUN mode..."
            npx tsx blog-agent.ts --dry-run --count=$COUNT
          else
            echo "Running in LIVE mode — posts will be saved to Supabase..."
            npx tsx blog-agent.ts --count=$COUNT
          fi

      - name: 📊 Report results
        if: always()
        run: |
          echo "✅ Blog agent workflow completed"
          echo "Check the Supabase dashboard for new posts:"
          echo "https://app.supabase.com"
